name: Build and Deploy Angular App to Azure

# Trigger workflow on push to main or manual trigger
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # 3. Install dependencies
      - name: Install npm packages
        run: npm install

      # 4. Clean old dist folder (optional but ensures safe overwrite)
      - name: Clean dist folder
        run: rm -rf ./dist/cafe-app

      # 5. Build Angular production
      - name: Build Angular production
        run: npm run build -- --configuration production

      # 6. Deploy to Azure Web App
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: cafeproj-g6ccheekf2a3gkc9          # your Web App name
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./dist/cafe-app                      # path to Angular build output
