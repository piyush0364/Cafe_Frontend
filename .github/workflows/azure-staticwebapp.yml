name: Deploy Angular to Azure Static Web App

on:
  push:
    branches:
      - main        # workflow triggers on push to main branch
  workflow_dispatch:  # allows manual trigger

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup Node.js for building Angular
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # 3️⃣ Install npm dependencies
      - name: Install npm packages
        run: |
          cd Cafe-app
          npm install

      # 4️⃣ Clean old build (optional but safer)
      - name: Clean dist folder
        run: |
          cd Cafe-app
          rm -rf dist/cafe-app

      # 5️⃣ Build Angular production
      - name: Build Angular production
        run: |
          cd Cafe-app
          npm run build -- --configuration production

      
      - name: Deploy to Azure Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "Cafe-app"                     # Angular project folder
          output_location: "Cafe-app/dist/cafe-app"    # Build output folder
